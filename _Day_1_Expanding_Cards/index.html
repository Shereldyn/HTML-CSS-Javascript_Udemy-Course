<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    -->
    <link rel="stylesheet" href="style.css">
    <title>Expanding Cards</title>
</head>
<!--! can use this in the shopping website project -->

<body>
    <div class="container">
        <!--container will be wrapping around 5 divs with the class of panel(children to the container)-->
        <div class="panel active"
            style="background-image: url('https://images.unsplash.com/photo-1558979158-65a1eaa08691?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=1350&q=80');">
            <!--*first div has a class of panel _and_ a class of active so that we'll know which card will be expanded(div will have a class of active)-->
            <h3>Explore The World</h3>
            <!--background image will only take up as much space as the content until you adjust it's size in css-->
        </div>
        <div class="panel"
            style="background-image: url('https://images.unsplash.com/photo-1572276596237-5db2c3e16c5d?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=1350&q=80')">
            <h3>Wild Forest</h3>
        </div>
        <div class="panel"
            style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=1353&q=80')">
            <h3>Sunny Beach</h3>
        </div>
        <div class="panel"
            style="background-image: url('https://images.unsplash.com/photo-1551009175-8a68da93d5f9?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=1351&q=80')">
            <h3>City on Winter</h3>
        </div>
        <div class="panel"
            style="background-image: url('https://images.unsplash.com/photo-1549880338-65ddcdfd017b?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=1350&q=80')">
            <h3>Mountains - Clouds</h3>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>

<!--
    *Getting links from Unsplash for pictures
    If you want to use your own images (from Unsplash) and not to just copy and paste addresses from Brad's(instructor's) codebase, you can sign up for the site (it may not be necessary), you shouldn't just use the share button and copy the link to get the photo's url. Instead you have to do 1 of 2 things:

    1. copy the image address after right-clicking, specifically "Copy Image Address", not other options, and you get a usable link to your image.

    2. use the word "source" in the address. Example: https://source.unsplash.com/. 

You can find some other ideas how to use their images. Basically it leads to their API.

Hopefully, it might help.
-->
